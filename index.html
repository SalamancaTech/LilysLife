<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lily's Life</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-button">
        <div class="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="close-icon">&times;</div>
    </div>

    <div id="prompt-bar">
        <input type="text" id="prompt-input" placeholder="Enter your prompt...">
        <button id="send-prompt">Send</button>
    </div>
    <div id="character-image">Character Image</div>
    <div id="location-image">Location Image</div>
    <div id="npc-image">NPC Image</div>
    <div id="stats">Stats</div>
    <div id="intent-matrix">Intent Matrix</div>
    <div id="player-options">Player Options</div>
    <div id="narrative-output">Narrative Output</div>
    <div id="event_counter">Event Counter</div>
    <div id="segment_counter">Segment Counter</div>

    <div id="menu-screen" class="hidden">
        <div id="settings_module">
            <h2>Settings</h2>

            <div class="settings-section">
                <h3>Theme</h3>
                <label for="font-select">Choose a font:</label>
                <select name="fonts" id="font-select">
                  <option value="'Hachi Maru Pop', cursive">Hachi Maru Pop</option>
                  <option value="Georgia, serif">Georgia</option>
                  <option value="Arial, sans-serif">Arial</option>
                  <option value="'Courier New', monospace">Courier New</option>
                  <option value="'Comic Sans MS', cursive">Comic Sans</option>
                  <option value="'Lexend Deca', sans-serif">Lexend Deca</option>
                </select>

                <label for="theme-select">Choose a style:</label>
                <select name="themes" id="theme-select">
                  <option value="Default" selected>Default</option>
                  <option value="Pink">Pink</option>
                  <option value="Blue">Blue</option>
                  <option value="Trans">Trans</option>
                  <option value="Black">Black</option>
                  <option value="White">White</option>
                  <option value="Cute">Cute</option>
                  <option value="RGB">RGB</option>
                  <option value="Colorblind">Colorblind</option>
                </select>

                <label for="font-size-select">Choose a font size:</label>
                <select name="font-sizes" id="font-size-select">
                  <option value="6pt">Smallest</option>
                  <option value="9pt">Small</option>
                  <option value="12pt" selected>Normal</option>
                  <option value="15pt">Large</option>
                  <option value="18pt">Largest</option>
                </select>

                <label for="glow-toggle">Glow:</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="glow-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="settings-section">
                <h3>Spiciness</h3>
                <label for="events-toggle">Events:</label>
                <span class="toggle-label">SFW only</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="events-toggle">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label">ALL</span>

                <br><br>

                <label for="nsfw-level-toggle">NSFW Level:</label>
                <span class="toggle-label">Light</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="nsfw-level-toggle">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label">Full</span>
            </div>

            <div class="settings-section">
                <h3>API</h3>
                <div id="api-key-section">
                    <h4>Gemini API Key</h4>
                    <div class="compact-api-controls">
                        <input type="password" id="api-key-input" placeholder="Enter your API key">
                        <button id="toggle-api-key-visibility">👁️</button>
                        <label class="toggle-switch">
                            <input type="checkbox" id="api-key-storage-toggle">
                            <span class="slider"></span>
                        </label>
                        <span id="storage-status">Unsaved</span>
                        <button id="apply-api-key">Apply</button>
                        <button id="clear-api-key">Clear</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="menu-options" class="hidden">
        <div class="icon">🗺️</div>
        <div class="icon">🎒</div>
        <div class="icon">🧑‍🤝‍🧑</div>
        <div class="icon">💰</div>
        <div class="icon">📔</div>
        <div class="icon">💾</div>
        <div class="icon" id="settings-icon">⚙️</div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>
    <script src="script.js"></script>
</body>
</html>
